worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile off;
    keepalive_timeout 65;
    gzip off;

    server {
        listen 8080;
        server_name _;

        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;

            sendfile off;
            gzip off;

            # Enable sub_filter for HTML
            sub_filter_once off;
            sub_filter_types *;

            # Default value
            set $appRef "test";

            # Read query parameter
            if ($arg_appReference != "") {
                set $appRef $arg_appReference;
            }

            # Replace placeholder in HTML
            sub_filter "{{APP_REFERENCE}}" "$appRef";
        }

        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}